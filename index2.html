<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Practica básica del DOM</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container text-center py-5">
        <h1 id="titulo-principal" class="mb-4">¿Cuál es tu nombre?</h1>
        
        <div>
            <form id="formulario-nombre">
                <input type="text" id="nombre-usuario" name="nombre-usuario" placeholder="Ingresa tu nombre" class="form-control d-inline-block w-50" required>
                <button type="submit" id="btn-enviar" class="btn btn-primary">Enviar</button>
            </form>
        </div>

        <div id="contenedor-mensaje" class="mt-4">
            <h3 id="mensaje-saludo"></h3>
        </div>
    </div>

    <script src="app2.js"></script>
</body>
</html>
