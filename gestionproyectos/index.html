<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Proyectos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; padding: 20px; }
        .card { margin-bottom: 15px; }
        /* Clases de prioridad para el borde lateral */
        .alta { border-left: 5px solid #dc3545; }
        .media { border-left: 5px solid #ffc107; }
        .baja { border-left: 5px solid #28a745; }
    </style>
</head>
<body>

    <div class="container">
        <h1 class="my-4">Gestión de Proyectos</h1>

        <button id="btnNuevo" class="btn btn-primary mb-4" data-bs-toggle="modal" data-bs-target="#modalProyecto">
            Nuevo Proyecto
        </button>

        <div id="listaProyectos">
            </div>

        <div id="sinProyectos" class="alert alert-info" style="display: none;">
            No hay proyectos registrados
        </div>
    </div>

    <div class="modal fade" id="modalProyecto" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">

                <div class="modal-header">
                    <h5 class="modal-title" id="modalTitulo">Nuevo Proyecto</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>

                <div class="modal-body">
                    <form id="formProyecto">
                        <input type="hidden" id="proyectoId">

                        <div class="mb-3">
                            <label class="form-label">Nombre</label>
                            <input type="text" class="form-control" id="nombre" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Descripción</label>
                            <textarea class="form-control" id="descripcion" rows="3"></textarea>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Fecha</label>
                            <input type="date" class="form-control" id="fecha" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Prioridad</label>
                            <select class="form-select" id="prioridad" required>
                                <option value="">Seleccionar</option>
                                <option value="baja">Baja</option>
                                <option value="media">Media</option>
                                <option value="alta">Alta</option>
                            </select>
                        </div>
                            <div class="mb-3">
                            <label class="form-label">Responsables</label>
                            <select class="form-select" id="responsables" required></select>
                                </div>

                        <button type="submit" id="btnGuardar" class="btn btn-primary">Guardar</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
