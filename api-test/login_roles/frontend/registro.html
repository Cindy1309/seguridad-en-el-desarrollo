<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Registro</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-5">
  <div class="card p-4 shadow">
    <h3>Registro</h3>
    <form action="/api/registrar" method="POST">
      <input class="form-control mb-2" name="usuario" placeholder="Usuario" required>
      <input type="password" class="form-control mb-2" name="password" placeholder="Contraseña" required>

 

      <button class="btn btn-primary">Guardar</button>
    </form>
    <a href="/gestion.html" class="mt-3 d-inline-block">Volver</a>
  </div>
</div>
</body>
</html>
