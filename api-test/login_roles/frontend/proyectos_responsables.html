<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Práctica 3 - Con Responsables</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" href="#">Gestión de Prácticas</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav me-auto">
                <li class="nav-item">
                    <a class="nav-link" href="#" onclick="irAPractica('basica')">Práctica 1 - Básica</a>
                </li>
                <li class="nav-item" id="navImagenes">
                    <a class="nav-link" href="#" onclick="irAPractica('imagenes')">Práctica 2 - Con Imágenes</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link active" href="#">Práctica 3 - Con Responsables</a>
                </li>
            </ul>
            <div class="d-flex">
                <span class="navbar-text text-white me-3" id="userInfo">Cargando...</span>
                <button class="btn btn-outline-light btn-sm me-2" onclick="irAlMenu()"> Volver</button>
                <button class="btn btn-outline-light btn-sm" onclick="logout()">Salir</button>
            </div>
        </div>
    </div>
</nav>


    <div class="container mt-4">
        <h1 class="my-4">Práctica 3 - Proyectos con Responsables</h1>

        <button id="btnNuevo" class="btn btn-primary mb-4" data-bs-toggle="modal" data-bs-target="#modalProyecto">
            Nuevo Proyecto
        </button>

        <div id="listaProyectos"></div>
        <div id="sinProyectos" class="alert alert-info" style="display: none;">
            No hay proyectos registrados
        </div>
    </div>

    <!-- Modal igual al de la práctica 3 -->
    <div class="modal fade" id="modalProyecto" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="modalTitulo">Nuevo Proyecto</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="formProyecto">
                        <input type="hidden" id="proyectoId">
                        <div class="mb-3">
                            <label class="form-label">Nombre</label>
                            <input type="text" class="form-control" id="nombre" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Descripción</label>
                            <textarea class="form-control" id="descripcion" rows="3"></textarea>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Fecha</label>
                            <input type="date" class="form-control" id="fecha" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Prioridad</label>
                            <select class="form-select" id="prioridad" required>
                                <option value="">Seleccionar</option>
                                <option value="baja">Baja</option>
                                <option value="media">Media</option>
                                <option value="alta">Alta</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Responsable</label>
                            <select class="form-select" id="responsables" required></select>
                        </div>
                        <button type="submit" id="btnGuardar" class="btn btn-primary">Guardar</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="app_responsables.js"></script>
    
</body>
</html>
