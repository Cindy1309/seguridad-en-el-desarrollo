<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Cambiar contraseña</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-5">
  <div class="card p-4 shadow">
    <h3>Cambiar contraseña</h3>
    <form action="/api/cambiar-password" method="POST">
      <input class="form-control mb-2" name="usuario" placeholder="Usuario" required>
      <input type="password" class="form-control mb-2" name="passwordActual" placeholder="Actual" required>
      <input type="password" class="form-control mb-3" name="nuevaPassword" placeholder="Nueva" required>
      <button class="btn btn-warning">Actualizar</button>
    </form>
    <a href="/gestion.html" class="mt-3">Volver</a>
  </div>
</div>
</body>
</html>
