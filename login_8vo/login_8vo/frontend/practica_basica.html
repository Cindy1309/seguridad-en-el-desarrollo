<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gestión de Proyectos</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
</head>
<body class="container py-4">
<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container">
            <a class="navbar-brand" href="#">Práctica 1 - Básica</a>
            <div class="ms-auto">
                <span class="navbar-text text-white me-3" id="userInfo"></span>
                <a href="portada.html" class="btn btn-light btn-sm me-2">Volver</a>
                <button class="btn btn-danger btn-sm" onclick="logout()">Salir</button>
            </div>
        </div>
</nav>

    <div class="container">
        <h1 class="my-4">Gestión de Proyectos</h1>
        
        <button class="btn btn-primary mb-4" data-bs-toggle="modal" data-bs-target="#modalProyecto">
            Nuevo Proyecto
        </button>
        
        <div id="listaProyectos">
            <!-- Proyectos se cargan aquí -->
        </div>
        
        <div id="sinProyectos" class="alert alert-info" style="display: none;">
            No hay proyectos registrados
        </div>
    </div>
    
    <!-- Modal -->
    <div class="modal fade" id="modalProyecto">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Nuevo Proyecto</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="formProyecto">
                        <div class="mb-3">
                            <label class="form-label">Nombre</label>
                            <input type="text" class="form-control" id="nombre" required>
                        </div>
                        
                        <div class="mb-3">
                            <label class="form-label">Descripción</label>
                            <textarea class="form-control" id="descripcion" rows="3"></textarea>
                        </div>
                        
                        <div class="mb-3">
                            <label class="form-label">Fecha</label>
                            <input type="date" class="form-control" id="fecha" required>
                        </div>
                        
                        <div class="mb-3">
                            <label class="form-label">Prioridad</label>
                            <select class="form-select" id="prioridad" required>
                                <option value="">Seleccionar</option>
                                <option value="baja">Baja</option>
                                <option value="media">Media</option>
                                <option value="alta">Alta</option>
                            </select>
                        </div>
                        
                        <button type="submit" class="btn btn-primary">Guardar</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
    
<script>
        const token = localStorage.getItem('token');
        const usuario = localStorage.getItem('usuario');
        const rol = localStorage.getItem('rol');
        if (!token) window.location.href = 'login.html';
        document.getElementById('userInfo').textContent = `${usuario} (${rol})`;
        function logout() {
            localStorage.clear();
            window.location.href = 'portada.html';
        }
</script>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="practica_basica.js"></script>
</body>
</html>
